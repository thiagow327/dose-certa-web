<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Dose Certa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="topbar p-3 mb-4">
        <div class="container d-flex align-items-center gap-2">
            <svg class="logo-cruz" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M9 2h6v7h7v6h-7v7H9v-7H2V9h7z" />
            </svg>
            <h3 class="text-white mb-0">Dose Certa</h3>
        </div>
    </header>

    <main class="container pb-5">

        <!-- Meus Remédios -->
        <section class="mb-4">
            <h2>Meus Remédios</h2>
            <p class="text-muted">Total: <strong id="total-remedios">--</strong></p>
            <div id="remedios-lista" class="row g-3"></div>
        </section>

        <div class="row g-4">

            <!-- Cadastrar Remédio -->
            <section class="col-lg-6">
                <div class="card p-4 h-100">
                    <h2>Cadastrar Remédio</h2>
                    <form id="form-cadastrar" class="mt-3">
                        <div class="mb-3">
                            <label>Nome</label>
                            <input type="text" class="form-control" id="nome" required>
                        </div>
                        <div class="mb-3">
                            <label>Dosagem</label>
                            <input type="number" class="form-control" id="dosagem" step="0.1" required>
                        </div>
                        <div class="mb-3">
                            <label>Unidade</label>
                            <select class="form-select" id="unidade">
                                <option value="comprimido">Comprimido(s)</option>
                                <option value="capsula">Cápsula(s)</option>
                                <option value="ml">ml</option>
                                <option value="gota">Gota(s)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Frequência</label>
                            <select class="form-select" id="frequencia">
                                <option value="6">A cada 6 horas</option>
                                <option value="8">A cada 8 horas</option>
                                <option value="12">A cada 12 horas</option>
                                <option value="24">Uma vez ao dia</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Primeiro horário</label>
                            <input type="time" class="form-control" id="horario" required>
                        </div>
                        <div class="mb-3">
                            <label>Observações</label>
                            <input type="text" class="form-control" id="observacoes">
                        </div>
                        <button type="button" class="btn btn-primary w-100" onclick="cadastrarRemedio()">Cadastrar</button>
                        <p id="msg-cadastrar" class="mt-2 text-center"></p>
                    </form>
                </div>
            </section>

            <!-- Registrar Dose + Histórico -->
            <div class="col-lg-6">

                <section class="card p-4 mb-4">
                    <h2>Registrar Dose</h2>
                    <form id="form-dose" class="mt-3">
                        <div class="mb-3">
                            <label>Remédio</label>
                            <select class="form-select" id="dose-remedio"></select>
                        </div>
                        <div class="mb-3">
                            <label>Observações</label>
                            <input type="text" class="form-control" id="dose-obs" maxlength="200">
                        </div>
                        <button type="button" class="btn btn-primary w-100" onclick="registrarDose()">Registrar</button>
                        <p id="msg-dose" class="mt-2 text-center"></p>
                    </form>
                </section>

                <section class="card p-4">
                    <h2>Histórico</h2>
                    <div class="mt-3">
                        <label>Selecione o remédio</label>
                        <select class="form-select" id="historico-remedio" onchange="carregarHistorico()"></select>
                    </div>
                    <div id="historico-lista" class="mt-3"></div>
                </section>

            </div>

        </div>

    </main>

    <script src="js/app.js"></script>
</body>

</html>
